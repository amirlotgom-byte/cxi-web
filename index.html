<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CXI // INTERFACE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-green: #00ff41; --bg-dark: #0a0a0a; --card-bg: #141414; }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 70px; display: flex; justify-content: center; }
        .main-wrapper { width: 100%; max-width: 600px; min-height: 100vh; background: #000; border-left: 1px solid #222; border-right: 1px solid #222; position: relative; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .glitch { font-size: 24px; font-weight: bold; text-shadow: 2px 0 red, -2px 0 blue; }
        .container { padding: 15px; }
        
        .search-box { padding: 10px 15px; }
        .search-box input { width: 100%; background: #000; border: 1px solid var(--main-green); color: var(--main-green); padding: 10px; outline: none; }

        .order-card, .chat-card { background: var(--card-bg); border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .order-card:hover, .chat-card:hover { border-color: var(--main-green); }
        .order-card h3, .chat-card h3 { margin: 0 0 5px 0; color: #fff; font-size: 18px; }
        .price { color: var(--main-green); font-weight: bold; margin-bottom: 10px; }
        .order-desc { display: none; font-size: 14px; color: #aaa; margin-top: 10px; border-top: 1px dashed #333; padding-top: 10px; }
        .order-card.open .order-desc { display: block; }
        
        /* Статусы чатов */
        .chat-status.active { color: var(--main-green); font-size: 12px; }
        .chat-status.closed { color: #ff003c; font-size: 12px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; display: flex; border-top: 1px solid #222; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 11px; cursor: pointer; color: #666; font-weight: bold; }
        .nav-item.active { color: var(--main-green); border-top: 2px solid var(--main-green); }

        .section { display: none; }
        .section.active { display: block; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .btn { background: var(--main-green); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        h2 { border-left: 4px solid var(--main-green); padding-left: 10px; font-size: 20px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <div class="glitch">CXI // CORE</div>
        <div id="user-status" style="font-size: 10px; margin-top: 5px;">SYSTEM ONLINE</div>
    </div>

    <div id="tab-catalog" class="section active">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ПОИСК ПО КЛЮЧАМ..." oninput="filterOrders()">
        </div>
        <div class="container" id="ordersList">
            <p style="color: #666; text-align: center;">Загрузка контрактов...</p>
        </div>
    </div>

    <div id="tab-add" class="section">
        <div class="container">
            <h2>НОВЫЙ КОНТРАКТ</h2>
            <div class="form-group"><input type="text" id="orderTitle" placeholder="НАЗВАНИЕ"></div>
            <div class="form-group"><textarea id="orderDesc" rows="5" placeholder="ПОДРОБНОЕ ТЕХНИЧЕСКОЕ ЗАДАНИЕ..."></textarea></div>
            <div class="form-group"><input type="number" id="orderPrice" placeholder="БЮДЖЕТ (RUB)"></div>
            <button class="btn" onclick="publishOrder()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <div id="tab-chats" class="section">
        <div class="container" id="chatsList">
            <h2>АКТИВНЫЕ ЧАТЫ</h2>
            <div class="chat-card" onclick="openChat('user123')">
                <h3>Заказ: Чекер NFT</h3>
                <span class="chat-status active">ОТКРЫТ (2 новых сообщения)</span>
            </div>
            <div class="chat-card" style="opacity: 0.6;">
                <h3>Заказ: Бот для мамы</h3>
                <span class="chat-status closed">КОНТРАКТ ЗАКРЫТ (Только чтение)</span>
            </div>
        </div>
    </div>

    <div id="tab-profile" class="section">
        <div class="container">
            <h2 id="userName">АНОНИМ</h2>
            <p style="font-size: 12px; color: #666;">ID: <span id="userId">---</span></p>
            <hr style="border-top: 1px solid #222; margin: 20px 0;">
            <h3>МОИ ОБЪЯВЛЕНИЯ</h3>
            <div id="myOrdersList" style="font-size: 14px; color: #888;">Нет активных контрактов.</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('catalog', this)">КАТАЛОГ</div>
        <div class="nav-item" onclick="showTab('add', this)">ДОБАВИТЬ</div>
        <div class="nav-item" onclick="showTab('chats', this)">ЧАТЫ</div>
        <div class="nav-item" onclick="showTab('profile', this)">ПРОФИЛЬ</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // ГЛОБАЛЬНАЯ НАСТРОЙКА БОТА: Сюда впиши юзернейм своего бота без @
    const BOT_USERNAME = "ТВОЙ_ЮЗЕРНЕЙМ_БОТА_bot"; 

    // База заказов теперь пустая, ждет API
    let orders = [];

    document.getElementById('userName').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "АНОНИМ";
    document.getElementById('userId').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "000000";

    function showTab(tabId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        el.classList.add('active');
    }

    function renderOrders() {
        const list = document.getElementById('ordersList');
        if (orders.length === 0) {
            list.innerHTML = '<p style="color: #666; text-align: center;">Нет доступных контрактов. Будь первым.</p>';
            return;
        }
        list.innerHTML = '';
        orders.forEach(order => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.onclick = () => card.classList.toggle('open');
            card.innerHTML = `
                <h3>${order.title}</h3>
                <div class="price">${order.price} RUB</div>
                <div class="order-desc">
                    ${order.desc}
                    <button class="btn" onclick="takeOrder('${order.id}', event)">ОТКЛИКНУТЬСЯ</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function publishOrder() {
        const title = document.getElementById('orderTitle').value;
        const price = document.getElementById('orderPrice').value;
        const desc = document.getElementById('orderDesc').value;

        if(!title || !price) return tg.showAlert("Заполни название и бюджет!");

        // Отправляем в бота (пока через sendData, так как это разовая отправка)
        tg.sendData(JSON.stringify({action: "new_order", title, price, desc}));
    }

    function takeOrder(id, event) {
        event.stopPropagation(); // Чтобы карточка не закрывалась
        // ИДЕАЛЬНОЕ РЕШЕНИЕ: Перекидываем юзера в бота с командой /start take_123
        tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?start=take_${id}`);
    }

    function openChat(chatId) {
        // Заглушка для открытия чата
        tg.showAlert("Здесь откроется история переписки по контракту.");
    }

    renderOrders(); 
</script>
</body>
</html>
