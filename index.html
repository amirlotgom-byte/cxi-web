<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CXI // INTERFACE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-green: #00ff41; --bg-dark: #0a0a0a; --card-bg: #141414; }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 70px; display: flex; justify-content: center; }
        .main-wrapper { width: 100%; max-width: 600px; min-height: 100vh; background: #000; position: relative; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .glitch { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        .container { padding: 15px; }
        
       
        .order-card { background: var(--card-bg); border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 4px; transition: transform 0.2s ease, border-color 0.2s ease; }
        .order-card:active { transform: scale(0.98); border-color: var(--main-green); }
        .price { color: var(--main-green); font-weight: bold; margin: 5px 0; font-size: 18px; }
        
        
        .section { display: none; opacity: 0; animation: fadeIn 0.3s forwards; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; display: flex; border-top: 1px solid #222; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 12px; cursor: pointer; color: #555; transition: color 0.3s; }
        .nav-item.active { color: var(--main-green); border-top: 2px solid var(--main-green); }
        
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; transition: border-color 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: var(--main-green); }
        .btn { background: var(--main-green); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        h2 { border-left: 3px solid var(--main-green); padding-left: 10px; font-size: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header"><div class="glitch" id="header-title">CXI // КАТАЛОГ</div></div>

    <div id="tab-catalog" class="section active">
        <div class="container" id="ordersList">
            <p style="text-align: center; color: #444;">Загрузка данных...</p>
        </div>
    </div>

    <div id="tab-add" class="section">
        <div class="container">
            <h2>НОВЫЙ КОНТРАКТ</h2>
            <input type="text" id="orderTitle" placeholder="Название (напр. Telegram Bot)">
            <textarea id="orderDesc" rows="4" placeholder="Краткое ТЗ..."></textarea>
            <input type="number" id="orderPrice" placeholder="Бюджет (RUB)">
            <button class="btn" onclick="submitOrder()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <div id="tab-profile" class="section">
        <div class="container">
            <h2>МОИ КОНТРАКТЫ</h2>
            <div id="myOrdersList"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('catalog', this, 'КАТАЛОГ')">КАТАЛОГ</div>
        <div class="nav-item" onclick="switchTab('add', this, 'СОЗДАНИЕ')">ДОБАВИТЬ</div>
        <div class="nav-item" onclick="switchTab('profile', this, 'ПРОФИЛЬ')">ПРОФИЛЬ</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    
    const USER_ID = tg.initDataUnsafe?.user?.id || 123456789; 
    
    
    const API_URL = "http://localhost:8000"; 

    function switchTab(tabId, el, title) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        document.getElementById('tab-' + tabId).classList.add('active');
        el.classList.add('active');
        document.getElementById('header-title').innerText = "CXI // " + title;

        if(tabId === 'catalog') loadOrders();
        if(tabId === 'profile') loadMyOrders();
    }

    
    async function loadOrders() {
        try {
            const res = await fetch(`${API_URL}/api/orders`);
            const data = await res.json();
            renderList('ordersList', data, true);
        } catch (e) {
            document.getElementById('ordersList').innerHTML = '<p style="color:red;">Ошибка связи с сервером</p>';
        }
    }

    
    async function loadMyOrders() {
        try {
            const res = await fetch(`${API_URL}/api/my_orders/${USER_ID}`);
            const data = await res.json();
            renderList('myOrdersList', data, false);
        } catch (e) {
            document.getElementById('myOrdersList').innerHTML = '<p style="color:red;">Ошибка сервера</p>';
        }
    }

   
    function renderList(elementId, data, showButton) {
        const list = document.getElementById(elementId);
        list.innerHTML = '';
        if (data.length === 0) {
            list.innerHTML = '<p style="text-align: center; color: #555;">Пусто</p>';
            return;
        }
        data.forEach(order => {
            const btnHtml = showButton ? `<button class="btn" style="margin-top:10px;" onclick="tg.openTelegramLink('https://t.me/cxi_contract_bot?start=take_${order.id}')">ОТКЛИКНУТЬСЯ</button>` : `<p style="color:#555; font-size:12px; margin-top:10px;">ID: ${order.id}</p>`;
            
            list.innerHTML += `
                <div class="order-card">
                    <h3 style="margin: 0 0 5px 0;">${order.title}</h3>
                    <div class="price">${order.price} RUB</div>
                    <div style="font-size: 14px; color: #aaa;">
                        ${order.description}
                        ${btnHtml}
                    </div>
                </div>
            `;
        });
    }

    
    async function submitOrder() {
        const title = document.getElementById('orderTitle').value;
        const desc = document.getElementById('orderDesc').value;
        const price = document.getElementById('orderPrice').value;

        if(!title || !price) return tg.showAlert("Заполни название и бюджет!");

        const payload = { owner_id: USER_ID, title: title, desc: desc, price: price };

        try {
            const res = await fetch(`${API_URL}/api/add_order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if(result.status === "ok") {
                tg.showAlert("Контракт успешно опубликован!");
                document.getElementById('orderTitle').value = '';
                document.getElementById('orderDesc').value = '';
                document.getElementById('orderPrice').value = '';
              
                document.querySelector('.nav-item').click(); 
            }
        } catch (e) {
            tg.showAlert("Ошибка при отправке на сервер.");
        }
    }

    
    loadOrders();
</script>
</body>
</html>
