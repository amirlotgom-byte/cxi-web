<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CXI // INTERFACE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-green: #00ff41; --bg-dark: #0a0a0a; --card-bg: #141414; }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 70px; display: flex; justify-content: center; overflow-x: hidden; }
        .main-wrapper { width: 100%; max-width: 600px; min-height: 100vh; background: #000; border-left: 1px solid #222; border-right: 1px solid #222; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .glitch { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 15px; }
        
        .order-card, .chat-card { background: var(--card-bg); border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 2px; }
        .price { color: var(--main-green); font-weight: bold; margin: 5px 0; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #000; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 12px; cursor: pointer; color: #555; }
        .nav-item.active { color: var(--main-green); border-top: 2px solid var(--main-green); }

        .section { display: none; }
        .section.active { display: block; }
        
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: var(--main-green); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        h2 { border-left: 4px solid var(--main-green); padding-left: 10px; font-size: 18px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header"><div class="glitch">CXI // TERMINAL</div></div>

    <div id="tab-catalog" class="section active">
        <div class="container" id="ordersList">
            <p style="text-align: center; color: #444;">ПОИСК АКТИВНЫХ КОНТРАКТОВ...</p>
        </div>
    </div>

    <div id="tab-add" class="section">
        <div class="container">
            <h2>СОЗДАТЬ ЗАПРОС</h2>
            <input type="text" id="orderTitle" placeholder="НАЗВАНИЕ">
            <textarea id="orderDesc" rows="4" placeholder="ТЕХНИЧЕСКОЕ ЗАДАНИЕ"></textarea>
            <input type="number" id="orderPrice" placeholder="БЮДЖЕТ (RUB)">
            <button class="btn" onclick="sendToBot()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <div id="tab-chats" class="section">
        <div class="container">
            <h2>МОИ ДИАЛОГИ</h2>
            <p style="color: #444;">НЕТ АКТИВНЫХ ЧАТОВ</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('catalog', this)">КАТАЛОГ</div>
        <div class="nav-item" onclick="showTab('add', this)">ДОБАВИТЬ</div>
        <div class="nav-item" onclick="showTab('chats', this)">ЧАТЫ</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function showTab(tabId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        el.classList.add('active');
    }

    function sendToBot() {
        const title = document.getElementById('orderTitle').value;
        const price = document.getElementById('orderPrice').value;
        const desc = document.getElementById('orderDesc').value;

        if(!title || !price) return alert("Заполни поля!");

        const data = { action: "new_order", title, price, desc };
        
        // Пытаемся отправить данные. Если не сработает (на мобилах), юзеру придется юзать кнопку меню.
        try {
            tg.sendData(JSON.stringify(data));
        } catch(e) {
            alert("Ошибка отправки. Попробуй открыть приложение через кнопку меню в боте.");
        }
    }
</script>
</body>
</html>
